name: Fetch neuriplo versions.env
description: Downloads versions.env from the neuriplo repo at the version pinned in the root versions.env

runs:
  using: composite
  steps:
    - name: Fetch neuriplo versions.env
      shell: bash
      run: |
        . ./versions.env
        neuriplo_ref="${NEURIPLO_VERSION:-${DEPENDENCIES_VERSION:-}}"
        if [[ -z "${neuriplo_ref}" ]]; then
          echo "Neither NEURIPLO_VERSION nor DEPENDENCIES_VERSION is set in versions.env" >&2
          exit 1
        fi

        if [[ "${neuriplo_ref}" == "self" ]]; then
          branch_name="${GITHUB_BASE_REF:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
          if [[ -z "${branch_name}" ]]; then
            branch_name="$(git rev-parse --abbrev-ref HEAD)"
          fi

          if [[ "${branch_name}" == "master" ]]; then
            neuriplo_ref="master"
          else
            neuriplo_ref="develop"
          fi
        fi

        mkdir -p build/_deps/neuriplo-src
        curl -fsSL "https://raw.githubusercontent.com/olibartfast/neuriplo/${neuriplo_ref}/versions.env" \
          -o build/_deps/neuriplo-src/versions.env
